name: test-fcop

# Cross-platform CI for the fcop library.
#
# Runs on every push to main/feat branches and every PR targeting main.
#
# Three jobs:
#   1. test     — full matrix (3 OS × 4 Python) running lint + mypy + pytest.
#                 `fail-fast: false` so one red square never hides the others.
#   2. coverage — Ubuntu / 3.12 only, enforces a minimum coverage floor so
#                 PRs that forget tests show up as red instead of slipping by.
#   3. package  — builds the wheel and the sdist, installs the wheel in a
#                 clean venv, smoke-imports, and runs pip-audit against the
#                 installed dep tree. Catches force-include / dep vulnerability
#                 regressions that pure unit tests cannot.

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

# Cancel older runs on the same ref when a new commit lands. Saves CI
# minutes and keeps the Checks tab clean during rapid iteration.
concurrency:
  group: test-fcop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install fcop + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint (ruff)
        run: python -m ruff check src tests

      # mypy runs in strict mode via pyproject.toml. Bugs that unit
      # tests can't see — e.g. an Optional being passed where a
      # non-Optional is expected — surface here.
      - name: Type check (mypy)
        run: python -m mypy src/fcop

      - name: Test (pytest)
        run: python -m pytest tests -v

  coverage:
    name: Coverage (Ubuntu / 3.12)
    runs-on: ubuntu-latest
    # Only one matrix cell needs coverage — the number is independent
    # of platform / Python version. Picking 3.12 because it's the
    # modal release as of 2026 and has the best tracer perf.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install fcop + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Measure coverage
        # --cov-fail-under pins the floor. Local baseline at D5 close
        # is 92% overall (see commit log). 90% leaves a small buffer
        # for fix-forward PRs. Bumping this number is a one-way
        # ratchet: raise it as the suite grows so it stays
        # meaningful, never lower it to accept new dead code.
        run: |
          python -m pytest tests \
            --cov=fcop \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          # Keeping a short retention window — coverage reports are
          # useful for debugging a failing PR but not as long-term
          # artifacts.
          retention-days: 7

  package:
    name: Build + install smoke + pip-audit
    runs-on: ubuntu-latest
    # Depends on `test` so we don't waste CI minutes building a wheel
    # from broken code. The coverage job runs in parallel — if it
    # fails we still want this one to report independently.
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build + audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pip-audit

      - name: Build wheel and sdist
        # Produces dist/fcop-*.whl and dist/fcop-*.tar.gz. --sdist
        # catches issues specific to the source distribution (e.g.
        # missing files from MANIFEST) that wheels alone don't.
        run: python -m build --wheel --sdist

      - name: Verify wheel contents
        # The bundled data files are fragile — a misconfigured
        # [tool.hatch.build.targets.wheel].include block would silently
        # ship an empty wheel, which unit tests can't catch because
        # they use the editable install. This assertion enforces the
        # packaging contract directly.
        run: |
          python -c "
          import zipfile, glob, sys
          whl = glob.glob('dist/fcop-*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          expected = [
              'fcop/rules/_data/fcop-rules.mdc',
              'fcop/rules/_data/fcop-protocol.mdc',
              'fcop/rules/_data/letter-to-admin.zh.md',
              'fcop/rules/_data/letter-to-admin.en.md',
              'fcop/teams/_data/index.json',
              'fcop/teams/_data/dev-team/README.md',
          ]
          missing = [e for e in expected if e not in names]
          if missing:
              print('MISSING from wheel:', missing)
              sys.exit(1)
          print(f'Wheel has {len(names)} files, all bundled data present.')
          "

      - name: Smoke-install wheel in a clean venv
        # A clean venv install with no source tree on the path is the
        # only way to verify importlib.resources actually finds the
        # bundled data — editable installs mask packaging bugs.
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist/fcop-*.whl
          /tmp/smoke-venv/bin/python -c "
          import fcop
          from fcop.rules import get_rules, get_rules_version
          from fcop.teams import get_available_teams, get_template

          print('fcop version:', fcop.__version__)
          print('rules version:', get_rules_version())
          teams = get_available_teams()
          print('bundled teams:', [t.name for t in teams])
          assert len(get_rules()) > 500, 'rules text suspiciously short'
          tmpl = get_template('dev-team', 'zh')
          assert len(tmpl.readme) > 100, 'dev-team readme suspiciously short'
          assert set(tmpl.roles) == {'PM', 'DEV', 'QA', 'OPS'}
          print('Smoke test OK.')
          "

      - name: Audit runtime dependencies (pip-audit)
        # Check *runtime* deps against the PyPI Advisory DB. We audit
        # fcop's declared runtime deps rather than the smoke venv's
        # installed tree so pip-audit doesn't try (and fail) to look
        # up fcop 0.6.0.dev0 itself on PyPI.
        #
        # pip-audit accepts a requirements file; we generate one that
        # lists only pyyaml (the sole runtime dep). Adding future
        # runtime deps means updating both pyproject.toml and this
        # list — a one-line chore that's preferable to the alternative
        # (whitelisting our own package name, which masks real audit
        # findings about "fcop").
        run: |
          python -m venv /tmp/audit-venv
          /tmp/audit-venv/bin/pip install --upgrade pip pip-audit
          # Extract runtime deps from the built wheel's METADATA.
          python - <<'PY'
          import glob, re, zipfile, pathlib
          whl = glob.glob('dist/fcop-*.whl')[0]
          with zipfile.ZipFile(whl) as zf:
              meta_name = next(n for n in zf.namelist() if n.endswith('METADATA'))
              text = zf.read(meta_name).decode('utf-8')
          reqs = [
              m.group(1).strip()
              for m in re.finditer(r'^Requires-Dist:\s*(.+?)\s*$', text, re.MULTILINE)
          ]
          reqs = [r for r in reqs if ';' not in r or 'extra ==' not in r]
          pathlib.Path('audit-requirements.txt').write_text('\n'.join(reqs) + '\n')
          print('audit target:')
          print(pathlib.Path('audit-requirements.txt').read_text())
          PY
          /tmp/audit-venv/bin/pip-audit --strict -r audit-requirements.txt

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fcop-dist
          path: dist/
          retention-days: 7

  surface-check:
    # Pre-1.0 Stability Charter (adr/ADR-0003) enforcement.
    #
    # Drift from the snapshot is already caught by the `test` matrix —
    # tests/test_fcop/test_public_surface.py runs there and will fail
    # on any change.
    #
    # This job adds a second gate: if a PR legitimately updates the
    # snapshot (i.e. added a method, added an optional param), the
    # CHANGELOG.md must announce it under a '## [Unreleased]' heading.
    # Otherwise downstream users get surprise additions they can't
    # discover from release notes.
    #
    # PR-only because on push-to-main we don't have a base ref to diff
    # against, and the change has already been gated at PR merge time.
    name: Stability charter (API surface + CHANGELOG)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for snapshot / CHANGELOG consistency
        run: |
          set -e
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=50
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "Files changed vs $BASE:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -q "tests/test_fcop/snapshots/public_surface.json"; then
            echo "::notice::public_surface.json modified — verifying CHANGELOG."
            if ! grep -q "^## \[Unreleased\]" CHANGELOG.md; then
              echo "::error::CHANGELOG.md is missing '## [Unreleased]' section."
              echo "Per ADR-0003, any public-API surface change must be announced."
              exit 1
            fi
            # Fetch the Unreleased section and ensure it mentions either 'Added',
            # 'Deprecated', or 'Changed' — these are the headings Keep a
            # Changelog uses and the only ones relevant to an API shift.
            SECTION=$(awk '/^## \[Unreleased\]/,/^## \[/' CHANGELOG.md | head -n 200)
            if ! echo "$SECTION" | grep -qE "^### (Added|Changed|Deprecated|Removed)"; then
              echo "::error::[Unreleased] section has no Added / Changed / Deprecated heading."
              echo "Public API drifted (snapshot file changed) but the CHANGELOG does"
              echo "not explain the change. See adr/ADR-0003-stability-charter.md."
              exit 1
            fi
            echo "CHANGELOG.md [Unreleased] properly documents the surface change."
          else
            echo "No public-surface snapshot change in this PR — nothing to enforce."
          fi
