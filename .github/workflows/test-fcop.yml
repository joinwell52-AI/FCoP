name: test-fcop

# Cross-platform CI for the fcop library.
#
# Runs on every push to main/feat branches and every PR targeting main.
# Matrix covers the three mainstream OSes × every Python version the
# library officially supports (see pyproject.toml requires-python and
# classifiers). `fail-fast: false` so one red square never hides the
# others — we always want to see *which* platform is broken.

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main

# Cancel older runs on the same ref when a new commit lands. Saves CI
# minutes and keeps the Checks tab clean during rapid iteration.
concurrency:
  group: test-fcop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install fcop + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Test (pytest)
        run: python -m pytest tests -v
